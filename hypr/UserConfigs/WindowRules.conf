# /* ---- 💫 https://github.com/JaKooLit 💫 ---- */  #
# For window rules and layerrules
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more

# This file is used to add or overwrite window rules
# This file will not be modified during dotfiles updates

# Border colors for fullscreen states
windowrule = border_color rgb(FB4934) rgb(FB4934), match:fullscreen 1

# Zen browser - transparent with blur
windowrule = match:class ^(zen-alpha|zen)$, opacity 0.99
windowrule = match:class ^(zen-alpha|zen)$, no_blur on

# Gromit annotation overlay
windowrule = match:class ^([Gg]romit-mpx)$, float on
windowrule = match:class ^([Gg]romit-mpx)$, no_blur on
windowrule = match:class ^([Gg]romit-mpx)$, no_anim on
windowrule = match:class ^([Gg]romit-mpx)$, opacity 1 override 1 override
windowrule = match:class ^([Gg]romit-mpx)$, no_shadow on
windowrule = match:class ^([Gg]romit-mpx)$, fullscreen_state 0 2
windowrule = match:class ^([Gg]romit-mpx)$, size 100% 100%
