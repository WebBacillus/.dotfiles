# Minimal Hyprlock config

source = $HOME/.config/hypr/wallust/wallust-hyprland.conf

general {
    grace = 1
    immediate_render = true
}

background {
    monitor =
    path = $HOME/.config/hypr/wallpaper_effects/.wallpaper_current
    color = rgb(0,0,0)
    blur_passes = 0
}

# Time
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = $color8
    font_size = 120
    font_family = JetBrainsMono Nerd Font
    position = 0, -30
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:18000000] echo "$(date +'%A, %-d %B')"
    color = $color8
    font_size = 28
    font_family = JetBrainsMono Nerd Font
    position = 0, 60
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    monitor =
    size = 280, 60
    outline_thickness = 1
    dots_size = 0.15
    dots_spacing = 0.2
    dots_center = true
    outer_color = $color8
    inner_color = rgba(255, 255, 255, 0.1)
    font_color = $color13
    fade_on_empty = false
    font_family = JetBrainsMono Nerd Font
    placeholder_text =  Password
    hide_input = false
    position = 0, 150
    halign = center
    valign = center
}

# USER
label {
    monitor =
    text = $USER
    color = $color9
    font_size = 24
    font_family = JetBrainsMono Nerd Font
    position = 0, 220
    halign = center
    valign = center
}
