font_family         JetBrainsMonoNL Nerd Font Mono
bold_font           auto
italic_font         auto
bold_italic_font    auto
font_size           14

# symbol_map U+0E01-U+0E5B IBM Plex Sans Thai
# symbol_map U+0E00-U+0E7F Tlwg Mono

# modify_font line_height 115%

window_padding_width 8
confirm_os_window_close 0

include theme.conf

detect_urls yes
url_color #0087bd
url_style curly

scrollback_lines 1500
wheel_scroll_multiplier 10.0

background_opacity 1
hide_window_decorations yes
sync_to_monitor yes

enable_audio_bell no

map ctrl+shift+f send_text all clear\n cd `cdinteractive`\n

cursor_shape block
